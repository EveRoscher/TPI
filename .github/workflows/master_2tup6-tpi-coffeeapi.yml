# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - 2tup6-tpi-coffeeapi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build, test y publicar el artifact
  # ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencias
        run: |
          dotnet restore TPI.slnx
          dotnet restore TPI.Infraestructure/TPI.Infraestructure.csproj

      - name: Build application
        run: dotnet build TPI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        
      - name: Publish
        run: dotnet publish TPI.Presentation/TPI.Presentation.csproj -c Release -o ./myapp

      - name: Upload artifact 
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./myapp

  # ─────────────────────────────────────────
  # JOB 2: Migraciones EF + Deploy a Azure
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F65CB745F4F94130AC6DF508C5A77C34 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B17EC33417214483AF383A297F8C7588 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E92B44B4733544F386279090C217C5AE }}
            
      - name: Set DB connection string in Azure Web App settings
        run: az webapp config appsettings set --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" --name "2tup6-tpi-coffeeapi" --settings 'ConnectionStrings__DBConnectionString=${{ secrets.DBCONNECTIONSTRING }}'

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 10.*

      - name: Update database with EF Core migrations
        run: dotnet ef database update --project TPI.Infraestructure/TPI.Infraestructure.csproj --startup-project TPI.Presentation/TPI.Presentation.csproj
        env:
          ConnectionStrings__DBConnectionString: ${{ secrets.DBCONNECTIONSTRING }}
          
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: '2tup6-tpi-coffeeapi'
          package: ./myapp

